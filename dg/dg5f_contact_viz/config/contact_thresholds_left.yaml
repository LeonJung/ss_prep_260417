# DG5F contact detection config — left hand.
# Mirror of contact_thresholds.yaml with lj_* topics.
# See that file for the pipeline description.

/**:
  ros__parameters:
    hand_side: left
    joint_states_topic: "/dg5f_left/joint_states"
    contact_level_topic: "/dg5f_left/contact_level"

    median_window: 15
    reject_above: 1000.0
    baseline_samples: 60

    motion_velocity_threshold: 0.05
    motion_settle_samples: 10

    contact_low:  [ 10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0 ]
    contact_high: [ 80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0 ]
    publish_rate_hz: 30.0
