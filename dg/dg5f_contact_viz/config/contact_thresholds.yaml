# DG5F contact detection config.
#
# Pipeline per joint:
#   raw effort
#     -> reject_above            (hard-drop Modbus frame corruption)
#     -> median over median_window samples
#     -> subtract auto-calibrated baseline  (idle reading per joint)
#     -> map to [0, 1] using contact_low / contact_high
#
# Thresholds are relative to the baseline, so the same numbers work
# across joints even when their idle currents differ (e.g. distal
# joints sit higher under gravity). Re-trigger calibration with:
#   ros2 service call /contact_monitor/zero_baseline std_srvs/srv/Trigger

/**/contact_monitor:
  ros__parameters:
    joint_states_topic: "/dg5f_right/joint_states"
    contact_level_topic: "/dg5f_right/contact_level"

    median_window: 15             # ~500 ms at 30 Hz; rejects 7 bursts in a row
    reject_above: 1000.0          # drop frame-corruption samples outright
    baseline_samples: 60          # ~2 s at 30 Hz; HOLD HAND STILL at startup

    # Motion gating — silence the lamp while the joint is commanded to move.
    # During motion the PID draws current for the acceleration itself, not
    # for external contact; we mask those frames so only resting-with-
    # resistance events light up. On every motion frame we also clear the
    # median history so post-motion lamps only use fresh samples.
    motion_velocity_threshold: 0.05   # rad/s
    motion_settle_samples: 10         # ~333 ms at 30 Hz

    # Fingertip F/T broadcaster inputs (from dg5f_driver when
    # ft_broadcaster:=true). Force magnitude in N is normalized by
    # fingertip_force_low/high after EMA smoothing.
    fingertip_level_topic: "/dg5f_right/fingertip_contact_level"
    fingertip_topics:
      - "/dg5f_right/fingertip_1_broadcaster/wrench"
      - "/dg5f_right/fingertip_2_broadcaster/wrench"
      - "/dg5f_right/fingertip_3_broadcaster/wrench"
      - "/dg5f_right/fingertip_4_broadcaster/wrench"
      - "/dg5f_right/fingertip_5_broadcaster/wrench"
    fingertip_force_low: 0.5
    fingertip_force_high: 5.0
    fingertip_ema_alpha: 0.3

    # All 20 entries below are relative to baseline (baseline-subtracted).
    contact_low:  [ 10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0,
                    10.0, 10.0, 10.0, 10.0 ]
    contact_high: [ 80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0,
                    80.0, 80.0, 80.0, 80.0 ]
    publish_rate_hz: 30.0
